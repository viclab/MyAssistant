version: "3.8"

services:
  myassistant:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # network_mode: host 让容器能访问宿主机的 Ollama (localhost:11434)
    network_mode: host
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ../src/.env
    volumes:
      - ../data:/app/data
    restart: unless-stopped
